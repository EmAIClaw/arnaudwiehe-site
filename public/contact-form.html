<!DOCTYPE html>
<html>
<head><title>Contact Form</title></head>
<body>
<form name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" action="/contact/thanks/">
  <input type="hidden" name="form-name" value="contact" />
  <p style="position:absolute;left:-9999px;"><label>Don't fill this out: <input name="bot-field" /></label></p>
  <input type="text" name="name" />
  <input type="email" name="email" />
  <input type="text" name="subject" />
  <textarea name="message"></textarea>
  <button type="submit">Send</button>
</form>
</body>
</html>
