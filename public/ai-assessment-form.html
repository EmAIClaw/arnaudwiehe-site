<!DOCTYPE html>
<html lang="en">
<head><title>AI Assessment</title></head>
<body>
<form name="ai-assessment" netlify netlify-honeypot="bot-field" action="/contact/thanks/">
  <input type="hidden" name="form-name" value="ai-assessment" />
  <input type="hidden" name="assessment-level" value="1" />
  <input type="hidden" name="assessment-title" value="N/A" />
  <p style="position:absolute;left:-9999px;"><label>Don't fill this out: <input name="bot-field" tabindex="-1" autocomplete="off" /></label></p>
  <p><label>Email <input type="email" name="email" required /></label></p>
  <p><button type="submit">Send</button></p>
</form>
</body>
</html>
